<!DOCTYPE html><html class="light" lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Học tập - Flashcard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #252527; /* surface-tile-3 equivalent */
        }

        .product-shadow {
            box-shadow: 3px 5px 30px rgba(0,0,0,0.22);
        }

        /* 3D Flip Animation Logic */
        .card-container {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .progress-bar-glow {
            box-shadow: 0 0 12px rgba(0, 102, 204, 0.4);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c8",
                        "on-secondary-fixed": "#1b1b1d",
                        "surface-container-high": "#e6e8f1",
                        "surface-variant": "#e1e2eb",
                        "surface-tint": "#005cba",
                        "primary-container": "#0066cc",
                        "on-tertiary-fixed-variant": "#793000",
                        "tertiary-fixed": "#ffdbcb",
                        "secondary-fixed": "#e4e2e4",
                        "surface-container": "#ecedf6",
                        "surface-dim": "#d8d9e2",
                        "on-primary-fixed-variant": "#00458e",
                        "primary-fixed-dim": "#aac7ff",
                        "tertiary": "#883700",
                        "outline": "#727784",
                        "surface-container-highest": "#e1e2eb",
                        "tertiary-container": "#af4900",
                        "inverse-surface": "#2e3037",
                        "background": "#f9f9ff",
                        "on-error": "#ffffff",
                        "on-primary-container": "#dfe8ff",
                        "inverse-primary": "#aac7ff",
                        "on-tertiary-container": "#ffe3d6",
                        "on-primary-fixed": "#001b3e",
                        "tertiary-fixed-dim": "#ffb692",
                        "outline-variant": "#c1c6d5",
                        "on-secondary-fixed-variant": "#474649",
                        "inverse-on-surface": "#eff0f9",
                        "on-error-container": "#93000a",
                        "on-surface": "#191c22",
                        "on-secondary-container": "#636264",
                        "error-container": "#ffdad6",
                        "secondary": "#5f5e60",
                        "secondary-container": "#e1dfe1",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "primary": "#004e9f",
                        "surface": "#f9f9ff",
                        "on-background": "#191c22",
                        "primary-fixed": "#d7e3ff",
                        "surface-container-low": "#f2f3fc",
                        "on-surface-variant": "#414753",
                        "on-tertiary-fixed": "#341100",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "section-padding": "48px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "container-margin": "20px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "display-lg": ["34px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["17px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-lg": ["13px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "body-md": ["15px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "display-lg-mobile": ["28px", {"lineHeight": "1.1", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface overflow-hidden">
<!-- Progress Bar (Fixed Top) -->
<div class="fixed top-0 left-0 w-full h-1.5 bg-white/10 z-[60]">
<div class="h-full bg-primary-container progress-bar-glow transition-all duration-500 ease-out" style="width: 37.5%;"></div>
</div>
<!-- Header Wrapper -->
<header class="fixed top-0 left-0 w-full z-50 px-gutter pt-8 pb-4 flex justify-between items-center bg-gradient-to-b from-[#252527] to-transparent">
<button aria-label="Đóng" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-lg text-label-lg text-white/90 tracking-widest uppercase">Tiến trình</span>
<span class="font-headline-sm text-headline-sm text-white">45 / 120</span>
</div>
<button aria-label="Xáo trộn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white">
<span class="material-symbols-outlined text-[24px]">shuffle</span>
</button>
</header>
<!-- Main Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center px-gutter pt-24 pb-40">
<!-- Study Flashcard Section -->
<div class="card-container w-full max-w-[400px] aspect-[3/4] relative group cursor-pointer" onclick="flipCard()">
<div class="card-inner w-full h-full product-shadow" id="flashcard">
<!-- Front Face -->
<div class="card-face card-front bg-surface rounded-lg p-stack-lg text-center">
<div class="flex-1 flex flex-col items-center justify-center gap-stack-md">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface lg:font-display-lg lg:text-display-lg">apple</h1>
<p class="font-label-md text-label-md text-on-surface-variant opacity-60">(chạm để lật)</p>
</div>
</div>
<!-- Back Face -->
<div class="card-face card-back bg-surface rounded-lg p-stack-lg border-2 border-primary-container/20">
<div class="flex-1 flex flex-col items-center justify-center text-center gap-stack-lg">
<div class="w-48 h-48 rounded-lg overflow-hidden mb-4">
<img class="w-full h-full object-cover" data-alt="A hyper-realistic studio photograph of a crisp, vibrant red apple with soft water droplets resting on its glossy skin. The lighting is professional and minimalist, set against a clean, neutral background that highlights the deep red and organic textures of the fruit. The overall aesthetic is clean, sophisticated, and high-fidelity, perfectly suited for a premium educational flashcard application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhhUPnz0OLegrwvnOKDqXAfIgWWDIEE6VU4DtrBkRnPNbSDWiGPvVAG4CqZ-UG73ksHS0RvmO5FZZfN0FBsUR2sW2HiI249RfbFBPWagxN6PpDryQqUkN5Qzt_A498cfjp32hmU-0LMKs1AUss_73anDqRhbnRPF43n3DxsnwlStlqWNf7M9R4PY4ciwZnHEutAUQ9Hb3FpxJz7eL9RmFACNgMXYeTR3lToXt6XWprl_JHMmQdTFSq4f76EFEkycDJt3DN8ecWJe42">
</div>
<h2 class="font-headline-md text-headline-md text-primary">Quả táo</h2>
<div class="h-px w-12 bg-outline-variant"></div>
<p class="font-body-md text-body-md text-on-surface-variant italic">"An apple a day keeps the doctor away."</p>
</div>
</div>
</div>
</div>
</main>
<!-- Controls (Fixed Bottom) -->
<footer class="fixed bottom-0 left-0 w-full p-gutter pb-10 flex justify-center gap-stack-md bg-gradient-to-t from-[#252527] via-[#252527]/90 to-transparent">
<div class="flex w-full max-w-[500px] gap-stack-md">
<!-- Ghost Button: Chưa thuộc -->
<button class="flex-1 h-14 rounded-full border border-white/20 text-white font-label-lg text-label-lg flex items-center justify-center gap-2 hover:bg-white/5 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[20px]">close</span>
                Chưa thuộc
            </button>
<!-- Primary Button: Đã thuộc -->
<button class="flex-1 h-14 rounded-full bg-primary-container text-white font-label-lg text-label-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-[20px]">check</span>
                Đã thuộc
            </button>
</div>
</footer>
<script>
        function flipCard() {
            const card = document.getElementById('flashcard');
            card.classList.toggle('is-flipped');
        }

        // Optional: Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                flipCard();
            }
            if (e.code === 'ArrowLeft') {
                // Logic for "Chưa thuộc"
                console.log('Chưa thuộc');
            }
            if (e.code === 'ArrowRight') {
                // Logic for "Đã thuộc"
                console.log('Đã thuộc');
            }
        });
    </script>
</body></html>
