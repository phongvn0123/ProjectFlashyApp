<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flashly - Tạo tài khoản</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#5f5e60",
                        "primary-fixed-dim": "#aac7ff",
                        "surface-tint": "#005cba",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#00458e",
                        "on-surface": "#191c22",
                        "secondary-fixed-dim": "#c8c6c8",
                        "primary-container": "#0066cc",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c1c6d5",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#414753",
                        "on-error-container": "#93000a",
                        "outline": "#727784",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eff0f9",
                        "on-tertiary-container": "#ffe3d6",
                        "on-secondary-fixed-variant": "#474649",
                        "tertiary-fixed": "#ffdbcb",
                        "surface-container-highest": "#e1e2eb",
                        "secondary-fixed": "#e4e2e4",
                        "surface-variant": "#e1e2eb",
                        "surface-bright": "#f9f9ff",
                        "inverse-primary": "#aac7ff",
                        "tertiary-container": "#af4900",
                        "on-tertiary-fixed-variant": "#793000",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e6e8f1",
                        "on-background": "#191c22",
                        "tertiary-fixed-dim": "#ffb692",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#341100",
                        "inverse-surface": "#2e3037",
                        "primary": "#004e9f",
                        "on-error": "#ffffff",
                        "secondary-container": "#e1dfe1",
                        "surface": "#f9f9ff",
                        "on-primary-fixed": "#001b3e",
                        "background": "#f9f9ff",
                        "primary-fixed": "#d7e3ff",
                        "on-secondary-fixed": "#1b1b1d",
                        "surface-dim": "#d8d9e2",
                        "surface-container": "#ecedf6",
                        "surface-container-low": "#f2f3fc",
                        "on-secondary-container": "#636264",
                        "on-primary-container": "#dfe8ff",
                        "tertiary": "#883700"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "section-padding": "48px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "container-margin": "20px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["34px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-lg": ["13px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg-mobile": ["28px", {"lineHeight": "1.1", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "body-md": ["15px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "body-lg": ["17px", {"lineHeight": "1.4", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f9f9ff;
            color: #191c22;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .parchment-bg {
            background-color: #f9f9ff;
        }
        .action-blue {
            background-color: #0066cc;
        }
        .hairline-border {
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .study-shadow {
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.12);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
        }
        /* Custom Chip logic */
        .chip-active {
            background-color: #0066cc !important;
            color: white !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-background/80 backdrop-blur-md border-b border-black/5">
<div class="max-w-[1200px] mx-auto px-container-margin py-4 flex justify-between items-center h-[64px]">
<button class="flex items-center gap-2 text-primary font-label-lg hover:opacity-80 transition-all active:scale-95" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
<span>Quay lại</span>
</button>
<div class="flex-1 text-center pr-[80px]">
<span class="font-display-lg text-headline-sm font-bold text-on-surface">Flashly</span>
</div>
</div>
</header>
<main class="max-w-[1200px] mx-auto px-container-margin py-section-padding min-h-[calc(100vh-64px)] flex flex-col items-center">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="mb-stack-lg text-center md:text-left">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-2">Tạo tài khoản</h1>
<p class="text-on-surface-variant font-body-md">Tham gia cộng đồng học tập thông minh Flashly.</p>
</div>
<!-- Form Content -->
<form class="space-y-stack-md" id="registrationForm">
<!-- Full Name -->
<div class="space-y-1">
<label class="block font-label-md text-on-surface-variant ml-4">Họ và tên</label>
<input class="w-full h-14 px-6 rounded-full parchment-bg hairline-border text-on-surface placeholder:text-outline focus:border-primary transition-colors" placeholder="Nguyễn Văn A" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1">
<label class="block font-label-md text-on-surface-variant ml-4">Email</label>
<input class="w-full h-14 px-6 rounded-full parchment-bg hairline-border text-on-surface placeholder:text-outline focus:border-primary transition-colors" placeholder="example@gmail.com" type="email"/>
</div>
<!-- Username -->
<div class="space-y-1">
<label class="block font-label-md text-on-surface-variant ml-4">Username</label>
<input class="w-full h-14 px-6 rounded-full parchment-bg hairline-border text-on-surface placeholder:text-outline focus:border-primary transition-colors" placeholder="flashly_user" type="text"/>
</div>
<!-- Password -->
<div class="space-y-1">
<label class="block font-label-md text-on-surface-variant ml-4">Mật khẩu</label>
<div class="relative group">
<input class="w-full h-14 px-6 rounded-full parchment-bg hairline-border text-on-surface placeholder:text-outline focus:border-primary transition-colors pr-14" id="password-field" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors p-2 rounded-full" onclick="togglePassword('password-field')" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-1">
<label class="block font-label-md text-on-surface-variant ml-4">Nhập lại mật khẩu</label>
<div class="relative group">
<input class="w-full h-14 px-6 rounded-full parchment-bg hairline-border text-on-surface placeholder:text-outline focus:border-primary transition-colors pr-14" id="confirm-password-field" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors p-2 rounded-full" onclick="togglePassword('confirm-password-field')" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Role Selection -->
<div class="pt-2">
<label class="block font-label-md text-on-surface-variant ml-4 mb-3">Vai trò của bạn</label>
<div class="flex gap-3">
<button class="role-chip flex-1 h-12 rounded-full hairline-border parchment-bg text-secondary font-label-lg transition-all active:scale-95 chip-active" data-role="student" onclick="selectRole(this)" type="button">
                            Tôi là Học sinh
                        </button>
<button class="role-chip flex-1 h-12 rounded-full hairline-border parchment-bg text-secondary font-label-lg transition-all active:scale-95" data-role="teacher" onclick="selectRole(this)" type="button">
                            Tôi là Giáo viên
                        </button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-stack-lg">
<button class="w-full h-14 rounded-full action-blue text-white font-headline-sm hover:opacity-90 active:scale-[0.98] transition-all study-shadow" type="submit">
                        Đăng ký
                    </button>
</div>
</form>
<!-- Footer Text -->
<div class="mt-stack-lg text-center pb-stack-lg">
<p class="text-on-surface-variant font-body-md">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold hover:underline" href="#">Đăng nhập ngay</a>
</p>
<div class="mt-8 flex justify-center items-center gap-4 text-outline opacity-50">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-md uppercase tracking-widest">Academic Precision Design</span>
</div>
</div>
</div>
</main>
<!-- Visual Embellishment: Soft Ambient Shader -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">

</div>
<script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling.querySelector('.material-symbols-outlined');
            if (field.type === "password") {
                field.type = "text";
                icon.textContent = "visibility_off";
            } else {
                field.type = "password";
                icon.textContent = "visibility";
            }
        }

        function selectRole(button) {
            document.querySelectorAll('.role-chip').forEach(chip => {
                chip.classList.remove('chip-active');
                chip.classList.remove('text-white');
                chip.classList.add('text-secondary');
            });
            button.classList.add('chip-active');
            button.classList.remove('text-secondary');
            button.classList.add('text-white');
        }

        // Intercept form to prevent reload
        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Logic for registration
            console.log('Registering...');
        });
    </script>
</body></html>
