<!-- Top AppBar (Sticky) -->

<label class="block font-label-lg text-label-lg text-on-surface-variant ml-2">Mô tả (tuỳ chọn)</label>
<input class="w-full h-14 px-6 rounded-full parchment-bg border-none font-body-md text-body-md placeholder:text-outline" placeholder="Thêm mô tả ngắn gọn về nội dung bộ thẻ..." type="text">
</div>
<!-- Visibility Selection -->

</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[18px]">radio_button_unchecked</span>

</button>
</div>
</div>
</section>

</div>

<!-- Bottom Navigation Mockup (Hidden on this transactional screen as per mandate) -->
<!-- But we'll add a floating save bar for mobile if needed, though header has it -->
<script>
        // Micro-interactions for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });

        // Simple visibility toggle logic simulation
        const visibilityBtns = document.querySelectorAll('[role="radio"]'); // (Simulated with button tags above)
        // Note: For real production, we'd use radio inputs and style labels
    </script>
