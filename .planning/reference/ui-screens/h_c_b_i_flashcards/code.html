<!DOCTYPE html><html class="light" lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        :root {
            --surface-tile-3: #252527;
            --product-shadow: 3px 5px 30px rgba(0,0,0,0.22);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface-tile-3);
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .study-card-shadow {
            box-shadow: var(--product-shadow);
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-surface-variant": "#414753",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed-dim": "#ffb692",
                        "on-tertiary-container": "#ffe3d6",
                        "on-surface": "#191c22",
                        "surface-variant": "#e1e2eb",
                        "on-error": "#ffffff",
                        "primary-container": "#0066cc",
                        "inverse-surface": "#2e3037",
                        "inverse-on-surface": "#eff0f9",
                        "on-tertiary-fixed-variant": "#793000",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d8d9e2",
                        "surface-container-high": "#e6e8f1",
                        "primary-fixed": "#d7e3ff",
                        "on-background": "#191c22",
                        "outline": "#727784",
                        "tertiary-fixed": "#ffdbcb",
                        "background": "#f9f9ff",
                        "surface-container": "#ecedf6",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#e1dfe1",
                        "on-secondary-container": "#636264",
                        "secondary-fixed": "#e4e2e4",
                        "primary-fixed-dim": "#aac7ff",
                        "secondary": "#5f5e60",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#341100",
                        "on-primary-fixed": "#001b3e",
                        "on-error-container": "#93000a",
                        "surface": "#f9f9ff",
                        "on-primary-fixed-variant": "#00458e",
                        "surface-tint": "#005cba",
                        "outline-variant": "#c1c6d5",
                        "on-primary-container": "#dfe8ff",
                        "tertiary": "#883700",
                        "primary": "#004e9f",
                        "on-secondary-fixed-variant": "#474649",
                        "surface-container-highest": "#e1e2eb",
                        "tertiary-container": "#af4900",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c8",
                        "surface-container-low": "#f2f3fc",
                        "on-secondary-fixed": "#1b1b1d",
                        "inverse-primary": "#aac7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "section-padding": "48px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "container-margin": "20px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "label-lg": ["13px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["17px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "display-lg-mobile": ["28px", {"lineHeight": "1.1", "fontWeight": "700"}],
                        "display-lg": ["34px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "1.4", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Header Section -->
<header class="w-full pt-8 px-gutter">
<div class="max-w-[1200px] mx-auto flex items-center justify-between">
<!-- Close Button -->
<button aria-label="Close Study Session" class="w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[28px]">close</span>
</button>
<!-- Progress Text -->
<div class="flex flex-col items-center">
<span class="font-label-lg text-label-lg text-white/90">45 / 120</span>
</div>
<!-- Shuffle Button -->
<button aria-label="Shuffle Cards" class="w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[24px]">shuffle</span>
</button>
</div>
<!-- Progress Bar -->
<div class="max-w-[1200px] mx-auto mt-6 h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[37.5%] transition-all duration-500 ease-out"></div>
</div>
</header>
<!-- Main Content: Flashcard Canvas -->
<main class="flex-grow flex items-center justify-center px-gutter py-stack-lg">
<div class="w-full max-w-[600px] aspect-[3/4] md:aspect-[4/5] perspective-1000 relative group cursor-pointer" onclick="flipCard()">
<div class="card-inner w-full h-full relative" id="cardInner">
<!-- Front Side -->
<div class="card-front bg-white rounded-[18px] study-card-shadow flex flex-col items-center justify-center p-stack-lg">
<h1 class="font-display-lg text-display-lg text-on-surface text-center px-4">apple</h1>
<p class="mt-4 font-label-md text-label-md text-on-surface-variant/50">(chạm để lật)</p>
<!-- Decorative Study Pattern -->
<div class="absolute bottom-6 right-6 opacity-5 select-none pointer-events-none">
<span class="material-symbols-outlined text-display-lg">auto_stories</span>
</div>
</div>
<!-- Back Side -->
<div class="card-back bg-white rounded-[18px] study-card-shadow flex flex-col items-center justify-center p-stack-lg">
<h1 class="font-display-lg text-display-lg text-primary text-center px-4">quả táo</h1>
<p class="mt-4 font-body-md text-body-md text-on-surface-variant text-center max-w-[80%] italic">"An apple a day keeps the doctor away."</p>
<p class="mt-8 font-label-md text-label-md text-on-surface-variant/50">(chạm để lật lại)</p>
</div>
</div>
</div>
</main>
<!-- Action Buttons -->
<footer class="pb-12 px-gutter flex justify-center items-center">
<div class="w-full max-w-[600px] grid grid-cols-2 gap-4">
<!-- Ghost Button: Chưa thuộc -->
<button class="h-14 flex items-center justify-center gap-2 rounded-full text-primary hover:bg-white/5 transition-colors active:scale-95 duration-150 group">
<span class="material-symbols-outlined text-[20px] transition-transform group-active:-translate-x-1">close</span>
<span class="font-label-lg text-label-lg">Chưa thuộc</span>
</button>
<!-- Primary Button: Đã thuộc -->
<button class="h-14 flex items-center justify-center gap-2 rounded-full bg-primary-container text-white shadow-lg hover:opacity-90 transition-all active:scale-95 duration-150 group">
<span class="material-symbols-outlined text-[20px] transition-transform group-active:scale-125">check</span>
<span class="font-label-lg text-label-lg">Đã thuộc</span>
</button>
</div>
</footer>
<!-- Particle Background Micro-interaction -->
<canvas class="fixed inset-0 pointer-events-none opacity-20" id="particleCanvas" width="390" height="884"></canvas>
<script>
        function flipCard() {
            const card = document.getElementById('cardInner');
            card.classList.toggle('card-flipped');
        }

        // Lightweight atmospheric effect
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body></html>
