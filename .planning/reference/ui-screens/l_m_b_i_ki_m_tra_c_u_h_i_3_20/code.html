<style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .hairline-border {
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      .study-shadow {
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.22);
      }
      .active-pill {
        border: 2px solid #0066cc;
        background-color: #f2f3fc;
      }
      .progress-transition {
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Bar (Task Focused: Shell Suppressed as per instructions, custom header used) -->
<header class="w-full bg-background sticky top-0 z-50">
<div class="max-w-[1200px] mx-auto px-container-margin py-4 flex justify-between items-center h-[72px]">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-lg text-label-lg text-primary-container tracking-wider tabular-nums" id="timer">12:44</span>
<span class="font-label-md text-label-md text-on-secondary-container">Question 3/20</span>
</div>
<div class="w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined text-outline">help</span>
</div>
</div>
<!-- Linear Progress Bar -->
<div class="w-full h-[4px] bg-surface-container-highest">
<div class="h-full bg-primary-container progress-transition" style="width: 15%;"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center max-w-[1200px] mx-auto w-full px-container-margin py-section-padding">
<div class="w-full max-w-2xl space-y-stack-lg">
<!-- Question Section -->
<div class="text-center space-y-stack-md px-4">
<h1 class="font-headline-md text-headline-md md:font-display-lg md:text-display-lg text-on-surface">
                    "Apple" nghĩa là gì?
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">Chọn câu trả lời đúng nhất cho từ vựng trên.</p>
</div>
<!-- Options Grid (Bento style interactive pill cards) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-stack-lg">
<!-- Option A: Selected -->
<button class="group relative flex items-center p-6 bg-surface-container-lowest rounded-lg hairline-border active-pill transition-all duration-200 text-left" onclick="selectOption(this)">
<div class="w-10 h-10 rounded-full bg-primary-container text-white flex items-center justify-center font-bold mr-4 shrink-0">A</div>
<span class="font-body-lg text-body-lg text-on-surface">Quả táo</span>
<div class="absolute right-6 top-1/2 -translate-y-1/2 opacity-100">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option B -->
<button class="group relative flex items-center p-6 bg-surface-container-lowest rounded-lg hairline-border hover:bg-surface-container-low transition-all duration-200 text-left" onclick="selectOption(this)">
<div class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold mr-4 shrink-0 group-hover:bg-primary-container group-hover:text-white transition-colors">B</div>
<span class="font-body-lg text-body-lg text-on-surface">Quả chuối</span>
</button>
<!-- Option C -->
<button class="group relative flex items-center p-6 bg-surface-container-lowest rounded-lg hairline-border hover:bg-surface-container-low transition-all duration-200 text-left" onclick="selectOption(this)">
<div class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold mr-4 shrink-0 group-hover:bg-primary-container group-hover:text-white transition-colors">C</div>
<span class="font-body-lg text-body-lg text-on-surface">Quả cam</span>
</button>
<!-- Option D -->
<button class="group relative flex items-center p-6 bg-surface-container-lowest rounded-lg hairline-border hover:bg-surface-container-low transition-all duration-200 text-left" onclick="selectOption(this)">
<div class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold mr-4 shrink-0 group-hover:bg-primary-container group-hover:text-white transition-colors">D</div>
<span class="font-body-lg text-body-lg text-on-surface">Quả lê</span>
</button>
</div>
<!-- Visualization / Context Hint (Optional Aesthetic Tile) -->
<div class="mt-stack-lg p-1 rounded-lg bg-surface-container overflow-hidden">
<div class="h-48 md:h-64 rounded-lg overflow-hidden bg-white flex items-center justify-center relative">
<img alt="Fresh organic apples" class="w-full h-full object-cover opacity-80" data-alt="A clean, minimalist high-key photograph of fresh organic red apples placed on a rustic white parchment surface. The lighting is soft and editorial, characteristic of a modern academic textbook or high-end lifestyle magazine. The scene conveys freshness and natural simplicity, using a bright and focused composition to align with the intellectual focus of a student study application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApHFNN6_NsQGAHibaOkNb8jMlzm39YdZEpK43DLtfPhaTQ2TTliVfiKBE1RATap2DgJmP8MLllSVqjhbFPQi767r-smgTbxH3-ZNHMKEQ6cN93nr5EW_3Q5HJAa9qfq_9P0kYo90xqZDBSO8lNL6JM3KLrwn90trAtlkrtVA9S2_3I807hGvEw8UdmTwxL6prb_oS8yTKfMv15Otl83Njog-f91seMKE2BYeceQanh4DXQaSr3wPiHifCaJFzKmE68cg3VFUCtZdFa">
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Navigation -->
<footer class="w-full bg-background pb-safe">
<div class="max-w-[1200px] mx-auto px-container-margin py-6 flex justify-between items-center">
<button class="px-8 py-3 rounded-full font-label-lg text-label-lg text-primary hover:bg-primary-container/5 transition-all active:scale-95 flex items-center">
<span class="material-symbols-outlined mr-2">chevron_left</span>
                Trước
            </button>
<button class="px-10 py-3 bg-primary-container text-white rounded-full font-label-lg text-label-lg shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center">
                Tiếp
                <span class="material-symbols-outlined ml-2">chevron_right</span>
</button>
</div>
</footer>
<script>
        function selectOption(element) {
            // Remove active state from all options
            const options = document.querySelectorAll('button[onclick="selectOption(this)"]');
            options.forEach(opt => {
                opt.classList.remove('active-pill');
                const badge = opt.querySelector('.absolute.right-6');
                if (badge) badge.remove();
                
                const letterBox = opt.querySelector('.rounded-full');
                letterBox.classList.remove('bg-primary-container', 'text-white');
                letterBox.classList.add('bg-surface-container-highest', 'text-on-surface-variant');
            });

            // Add active state to selected
            element.classList.add('active-pill');
            
            const activeLetterBox = element.querySelector('.rounded-full');
            activeLetterBox.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
            activeLetterBox.classList.add('bg-primary-container', 'text-white');

            const checkmark = document.createElement('div');
            checkmark.className = 'absolute right-6 top-1/2 -translate-y-1/2 opacity-100';
            checkmark.innerHTML = '<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
            element.appendChild(checkmark);
        }

        // Simple Countdown Logic
        let timeLeft = 12 * 60 + 45;
        const timerDisplay = document.getElementById('timer');
        
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    </script>
</body></html>
