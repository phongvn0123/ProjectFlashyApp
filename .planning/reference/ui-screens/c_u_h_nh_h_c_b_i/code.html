<!DOCTYPE html><html class="light" lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Chọn cách học - IELTS Vocab 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#f2f3fc",
                    "surface-container-highest": "#e1e2eb",
                    "surface-bright": "#f9f9ff",
                    "secondary-fixed-dim": "#c8c6c8",
                    "surface-dim": "#d8d9e2",
                    "on-surface": "#191c22",
                    "tertiary-fixed": "#ffdbcb",
                    "surface-tint": "#005cba",
                    "primary-fixed": "#d7e3ff",
                    "primary-fixed-dim": "#aac7ff",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8f1",
                    "outline-variant": "#c1c6d5",
                    "on-primary-container": "#dfe8ff",
                    "on-background": "#191c22",
                    "tertiary-fixed-dim": "#ffb692",
                    "on-tertiary-fixed": "#341100",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#e1e2eb",
                    "on-primary-fixed": "#001b3e",
                    "primary-container": "#0066cc",
                    "secondary-fixed": "#e4e2e4",
                    "inverse-on-surface": "#eff0f9",
                    "on-secondary-container": "#636264",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#ecedf6",
                    "primary": "#004e9f",
                    "tertiary": "#883700",
                    "tertiary-container": "#af4900",
                    "on-tertiary-container": "#ffe3d6",
                    "inverse-surface": "#2e3037",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#1b1b1d",
                    "on-primary-fixed-variant": "#00458e",
                    "on-surface-variant": "#414753",
                    "secondary": "#5f5e60",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#aac7ff",
                    "background": "#f9f9ff",
                    "on-secondary-fixed-variant": "#474649",
                    "on-tertiary-fixed-variant": "#793000",
                    "secondary-container": "#e1dfe1",
                    "on-tertiary": "#ffffff",
                    "surface": "#f9f9ff",
                    "outline": "#727784"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-padding": "48px",
                    "gutter": "16px",
                    "stack-lg": "32px",
                    "container-margin": "20px",
                    "stack-sm": "8px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "display-lg-mobile": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "display-lg-mobile": ["28px", {"lineHeight": "1.1", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "headline-sm": ["20px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-lg": ["17px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-lg": ["13px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "display-lg": ["34px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["15px", {"lineHeight": "1.4", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .switch-checkbox:checked + .switch-label {
            background-color: #004e9f;
        }
        .switch-checkbox:checked + .switch-label .switch-dot {
            transform: translateX(1.25rem);
        }
        .option-chip-active {
            border-color: #004e9f;
            background-color: #e6e8f1;
        }
        /* Custom Hairline Borders as per Style Guidance */
        .hairline {
            border: 0.5px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen text-on-background flex flex-col max-w-[430px] mx-auto relative">
<!-- Top AppBar (from Shared Components Logic, but adapted for sub-page "Back" intent) -->
<header class="w-full top-0 sticky z-40 bg-background/80 backdrop-blur-md px-container-margin py-4 flex items-center gap-4">
<button aria-label="Quay lại" class="w-10 h-10 flex items-center justify-center rounded-full active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Chọn cách học</h1>
<p class="font-label-md text-label-md text-on-surface-variant">IELTS Vocab 1</p>
</div>
</header>
<main class="flex-1 px-container-margin pb-32">
<!-- Animated Intro Shader Placeholder -->
<div class="relative w-full h-40 mt-4 rounded-lg overflow-hidden hairline bg-surface-container-low mb-stack-lg">

<div class="absolute inset-0 flex flex-col justify-end p-stack-md bg-gradient-to-t from-surface-container-low to-transparent">
<span class="font-label-lg text-label-lg text-primary uppercase tracking-wider">Cấu hình phiên học</span>
<p class="font-body-md text-body-md text-on-surface-variant">Tối ưu hoá quá trình ghi nhớ dựa trên mục tiêu của bạn.</p>
</div>
</div>
<!-- Section: Chế độ học -->
<section class="mb-stack-lg">
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase mb-stack-md tracking-widest">Chế độ học</h2>
<div class="flex flex-col gap-stack-sm">
<!-- Option Chip 1 (Selected) -->
<button class="option-group-item w-full p-4 rounded-lg bg-surface flex items-center justify-between hairline transition-all border-2 border-primary ring-1 ring-primary/20" data-group="study-mode" onclick="toggleOption(this, 'study-mode')">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
<span class="font-body-lg text-body-lg text-on-surface">Học tất cả (120 thẻ)</span>
</div>
</button>
<!-- Option Chip 2 -->
<button class="option-group-item w-full p-4 rounded-lg bg-surface flex items-center justify-between hairline transition-all hover:bg-surface-container-low" data-group="study-mode" onclick="toggleOption(this, 'study-mode')">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">radio_button_unchecked</span>
<span class="font-body-lg text-body-lg text-on-surface">Chỉ ôn thẻ chưa thuộc (16)</span>
</div>
</button>
</div>
</section>
<!-- Section: Mặt hiện trước -->
<section class="mb-stack-lg">
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase mb-stack-md tracking-widest">Mặt hiện trước</h2>
<div class="flex bg-surface-container-low p-1 rounded-full hairline">
<button class="pill-item flex-1 py-2.5 rounded-full font-label-lg text-label-lg bg-primary text-on-primary shadow-sm transition-all" data-group="side-mode" onclick="switchPill(this, 'side-mode')">
                    Thuật ngữ
                </button>
<button class="pill-item flex-1 py-2.5 rounded-full font-label-lg text-label-lg text-on-surface-variant hover:text-on-surface transition-all" data-group="side-mode" onclick="switchPill(this, 'side-mode')">
                    Định nghĩa
                </button>
</div>
</section>
<!-- Section: Tuỳ chọn (Switches) -->
<section>
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase mb-stack-md tracking-widest">Tuỳ chọn</h2>
<div class="bg-surface rounded-lg hairline divide-y divide-black/5">
<!-- Switch 1 -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">shuffle</span>
<span class="font-body-lg text-body-lg text-on-surface">Xáo trộn thứ tự thẻ</span>
</div>
<div class="relative inline-block w-10 h-5">
<input checked="" class="hidden switch-checkbox" id="shuffle" type="checkbox">
<label class="switch-label absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-surface-container-highest rounded-full transition-all duration-300" for="shuffle">
<span class="switch-dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-all duration-300"></span>
</label>
</div>
</div>
<!-- Switch 2 -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">productivity</span>
<span class="font-body-lg text-body-lg text-on-surface">Lặp lại thẻ chưa thuộc</span>
</div>
<div class="relative inline-block w-10 h-5">
<input class="hidden switch-checkbox" id="repeat" type="checkbox">
<label class="switch-label absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-surface-container-highest rounded-full transition-all duration-300" for="repeat">
<span class="switch-dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-all duration-300"></span>
</label>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 w-full max-w-[430px] p-container-margin bg-background/90 backdrop-blur-md">
<button class="w-full bg-primary-container text-on-primary py-4 rounded-full font-headline-sm text-headline-sm shadow-lg active:scale-95 transition-all duration-200">
            Bắt đầu học
        </button>
</div>
<script>
        function toggleOption(element, group) {
            const items = document.querySelectorAll(`[data-group="${group}"]`);
            items.forEach(item => {
                item.classList.remove('border-primary', 'ring-1', 'ring-primary/20');
                item.classList.add('hover:bg-surface-container-low');
                const icon = item.querySelector('.material-symbols-outlined');
                icon.textContent = 'radio_button_unchecked';
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
                icon.style.fontVariationSettings = "'FILL' 0";
            });
            
            element.classList.add('border-primary', 'ring-1', 'ring-primary/20');
            element.classList.remove('hover:bg-surface-container-low');
            const activeIcon = element.querySelector('.material-symbols-outlined');
            activeIcon.textContent = 'radio_button_checked';
            activeIcon.classList.remove('text-on-surface-variant');
            activeIcon.classList.add('text-primary');
            activeIcon.style.fontVariationSettings = "'FILL' 1";
        }

        function switchPill(element, group) {
            const items = document.querySelectorAll(`[data-group="${group}"]`);
            items.forEach(item => {
                item.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                item.classList.add('text-on-surface-variant');
            });
            
            element.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
            element.classList.remove('text-on-surface-variant');
        }
    </script>
</body></html>
