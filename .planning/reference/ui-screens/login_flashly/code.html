                    "on-tertiary-fixed-variant": "#793000",
                    "tertiary-fixed": "#ffdbcb",
                    "secondary-fixed": "#e4e2e4",
                    "surface-container": "#ecedf6",

                    "on-primary-fixed-variant": "#00458e",
                    "primary-fixed-dim": "#aac7ff",
                    "tertiary": "#883700",
                    "outline": "#727784",
                    "surface-container-highest": "#e1e2eb",
                    "tertiary-container": "#af4900",
                    "inverse-surface": "#2e3037",
                    "background": "#f9f9ff",
                    "on-error": "#ffffff",
                    "on-primary-container": "#dfe8ff",
                    "inverse-primary": "#aac7ff",

                    "surface-bright": "#f9f9ff",

                    "surface": "#f9f9ff",

            "borderRadius": {
                    "DEFAULT": "1rem",

            "spacing": {

                    "section-padding": "48px",
                    "stack-md": "16px",
                    "stack-sm": "8px",
                    "container-margin": "20px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "headline-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "display-lg": ["Inter"],

<style>
        body {
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hairline-border {
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .study-shadow {
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.08);
        }
        /* Hide scrollbar for clean editorial look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-padding">
<div class="w-full max-w-[440px] text-center space-y-stack-lg">
<!-- Branding Header -->
<header class="space-y-stack-sm animate-fade-in">
<h1 class="text-hero-display font-display-lg text-primary tracking-tighter">Flashly</h1>
<p class="text-body-lg text-on-surface-variant font-body-lg">Học nhanh. Nhớ lâu.</p>
</header>
<!-- Login Form -->
<div class="mt-stack-lg space-y-stack-md bg-surface-container-lowest p-stack-lg rounded-xl hairline-border study-shadow">
<form class="space-y-4" onsubmit="event.preventDefault();">
<!-- Username/Email Field -->
<div class="relative group">
<label class="sr-only" for="identity">Email hoặc Tên đăng nhập</label>
<input class="w-full px-6 py-4 rounded-full hairline-border bg-white text-body-md focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all placeholder:text-outline" id="identity" placeholder="Email hoặc Tên đăng nhập" type="text">
</div>
<!-- Password Field -->
<div class="relative group">
<label class="sr-only" for="password">Mật khẩu</label>
<input class="w-full px-6 py-4 rounded-full hairline-border bg-white text-body-md focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none transition-all placeholder:text-outline" id="password" placeholder="Mật khẩu" type="password">
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="text-right px-2">
<a class="text-label-lg font-label-lg text-primary-container hover:underline transition-all" href="#">
                            Quên mật khẩu?
                        </a>
</div>
<!-- CTA Button -->
<div class="pt-2">
<button class="w-full bg-primary-container text-white py-4 rounded-full font-label-lg text-label-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
                            Đăng nhập
                        </button>
</div>
</form>
<!-- Social Divider (Optional for High-End Feel) -->
<div class="flex items-center gap-4 py-2">
<div class="h-px bg-black/5 flex-grow"></div>
<span class="text-label-md text-outline font-label-md">Hoặc</span>
<div class="h-px bg-black/5 flex-grow"></div>
</div>
<!-- Secondary Option -->
<button class="w-full py-4 rounded-full hairline-border bg-white text-on-surface font-label-lg text-label-lg hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2">
<img alt="Google Logo" class="w-5 h-5" data-alt="A clean, high-resolution vector logo of the Google 'G' icon on a transparent background, following professional corporate branding standards. The colors are the standard Google brand colors of blue, red, yellow, and green, rendered with crisp edges for a minimalist UI integration." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuZQi583Tx_KUNopMso66m-46AEVTwlXggGyL2IjBSLNJy2kYOwRVCyUZGs7eAjy44M61h1nRg4BY6ZDHCrUDYP_rA2tm5FShat5hPEr03Yz12qHtZs0JKvUaY5suIxS75fgE6yJH4mFqgQrlpVvR1_q3XBkNHZUoqjIWC3jK9DhDrhrPRuiNnlFAyQkiQFLlEkKlz1ZcAIxdxUjYK24Yhr4CVT0GAXl9ozyWAYOAiQPV4jzweBAWxZib8D15GTMRaOWrBvqHTSHT6">
                    Tiếp tục với Google
                </button>
</div>
<!-- Footer Links -->
<footer class="pt-stack-md">
<p class="text-body-md text-on-surface-variant font-body-md">
                    Chưa có tài khoản? 
                    <a class="text-primary-container font-semibold hover:underline decoration-2 underline-offset-4" href="#">Đăng ký</a>
</p>
</footer>
</div>
</main>
<!-- Decoration Element (Subtle Background Detail) -->
<div class="fixed top-0 right-0 p-12 -z-10 opacity-20 hidden md:block">
<div class="grid grid-cols-2 gap-4">
<div class="w-24 h-32 rounded-lg bg-primary-container/10 border border-primary-container/20 rotate-12"></div>
<div class="w-24 h-32 rounded-lg bg-secondary-container/30 border border-secondary/10 -rotate-6 mt-8"></div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Micro-interaction for form inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('div').classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('div').classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
