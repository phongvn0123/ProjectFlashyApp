                        "tertiary-fixed": "#ffdbcb",
                        "background": "#f9f9ff",
                        "surface-container": "#ecedf6",

                        "secondary-container": "#e1dfe1",
                        "on-secondary-container": "#636264",
                        "secondary-fixed": "#e4e2e4",

                        "secondary": "#5f5e60",
                        "error-container": "#ffdad6",

                        "outline-variant": "#c1c6d5",

                        "tertiary": "#883700",

                        "on-secondary-fixed-variant": "#474649",
                        "surface-container-highest": "#e1e2eb",
                        "tertiary-container": "#af4900",

                    "spacing": {

                        "stack-sm": "8px",

<style>
        body {
            background-color: #f5f5f7; /* Parchment background */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 1s ease-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .parchment-canvas {
            background-color: #f5f5f7;
        }
        .hairline-border {
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body-md text-on-surface">
<!-- Main Content Area -->
<main class="min-h-screen flex flex-col items-center justify-center px-container-margin py-section-padding max-w-[1200px] mx-auto">
<!-- Celebration Header -->
<div class="text-center mb-stack-lg">
<div class="text-[64px] mb-4 animate-bounce">🎉</div>
<h1 class="font-display-lg text-display-lg text-on-background mb-2">Hoàn thành!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant/80">IELTS Vocab 1</p>
</div>
<!-- Hero Stat: Progress Ring -->
<div class="relative flex items-center justify-center mb-12">
<svg class="w-64 h-64 md:w-80 md:h-80">
<circle class="text-surface-container stroke-current" cx="128" cy="128" fill="transparent" r="120" stroke-width="12" style="r: clamp(100px, 15vw, 120px); cx: 50%; cy: 50%;"></circle>
<circle class="text-primary-container stroke-current progress-ring__circle" cx="128" cy="128" fill="transparent" r="120" stroke-dasharray="753.98" stroke-dashoffset="98.02" stroke-linecap="round" stroke-width="12" style="r: clamp(100px, 15vw, 120px); cx: 50%; cy: 50%;"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="font-display-lg text-display-lg text-primary-container">87%</span>
<span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">đã thuộc</span>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-3 gap-stack-md w-full max-w-lg mb-4">
<!-- Total Card -->
<div class="bg-surface-container-lowest hairline-border p-5 rounded-[18px] text-center flex flex-col items-center justify-center aspect-square md:aspect-auto">
<span class="font-headline-md text-headline-md text-on-surface">120</span>
<span class="font-label-md text-label-md text-on-surface-variant">Tổng</span>
</div>
<!-- Known Card -->
<div class="bg-surface-container-lowest hairline-border p-5 rounded-[18px] text-center flex flex-col items-center justify-center aspect-square md:aspect-auto">
<span class="font-headline-md text-headline-md text-primary">104</span>
<span class="font-label-md text-label-md text-on-surface-variant">Thuộc</span>
</div>
<!-- Unknown Card -->
<div class="bg-surface-container-lowest hairline-border p-5 rounded-[18px] text-center flex flex-col items-center justify-center aspect-square md:aspect-auto">
<span class="font-headline-md text-headline-md text-error">16</span>
<span class="font-label-md text-label-md text-on-surface-variant">Chưa</span>
</div>
</div>
<!-- Time Caption -->
<div class="flex items-center gap-2 mb-12 text-on-surface-variant/70 font-body-md text-body-md">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span>⏱ Thời gian: 6 phút 12 giây</span>
</div>
<!-- Action Buttons -->
<div class="flex flex-col items-center w-full max-w-sm gap-stack-md">
<!-- Primary Action -->
<button class="w-full py-4 px-8 bg-primary-container text-on-primary font-headline-sm text-headline-sm rounded-full shadow-lg hover:opacity-90 active:scale-95 transition-all duration-200">
                Ôn 16 thẻ chưa thuộc
            </button>
<!-- Secondary Links -->
<div class="flex items-center gap-8 mt-2">
<button class="text-primary font-label-lg text-label-lg hover:underline transition-all">
                    Học lại từ đầu
                </button>
<div class="w-[1px] h-4 bg-outline-variant"></div>
<button class="text-on-surface-variant font-label-lg text-label-lg hover:text-on-surface transition-all">
                    Xong
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation (Shared Component Integration) -->
<nav class="fixed bottom-0 w-full z-50 h-[88px] bg-surface/80 dark:bg-surface-container/80 backdrop-blur-md border-t border-black/5 flex justify-around items-center px-container-margin pb-safe">
<a class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md">Trang chủ</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined">style</span>
<span class="font-label-md text-label-md">Thư viện</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="font-label-md text-label-md">Lớp học</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-semibold hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-md text-label-md">Bài kiểm tra</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-container hover:bg-surface-container-low transition-colors px-4 py-2 rounded-xl" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Cá nhân</span>
</a>
</nav>
<script>
        // Micro-interaction for the progress ring on load
        window.addEventListener('load', () => {
            const circle = document.querySelector('.progress-ring__circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            
            // 87% progress calculation
            const offset = circumference - (87 / 100 * circumference);
            
            // Small delay to trigger animation
            setTimeout(() => {
                circle.style.strokeDashoffset = offset;
            }, 300);
        });

        // Add subtle hover effects to stat cards
        document.querySelectorAll('.hairline-border').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-2px)';
                card.style.transition = 'transform 0.2s ease-out';
                card.style.borderColor = 'rgba(0, 102, 204, 0.2)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
                card.style.borderColor = 'rgba(0, 0, 0, 0.1)';
            });
        });
    </script>
</body></html>
