<body class="bg-background text-on-background min-h-screen">
<!-- Top AppBar (Back Action - No Nav Shell) -->
<header class="w-full top-0 sticky z-40 bg-background/80 glass-nav border-b border-black/5">
<div class="max-w-[1200px] mx-auto px-gutter py-4 flex justify-between items-center">
<div class="flex items-center gap-4">
<button class="hover:opacity-90 active:opacity-80 transition-all">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">IELTS Vocab 1</h1>
<p class="text-inkMuted48 font-label-md text-label-md">120 thẻ · GV. Nam · Công khai</p>
</div>
</div>
<button class="hover:opacity-90 active:opacity-80 transition-all">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</button>
</div>
</header>
<main class="max-w-[1200px] mx-auto pb-safe">
<!-- Hero Section: Study Actions -->
<section class="px-container-margin py-stack-lg">
<div class="bg-surface-tile-1 rounded-lg p-stack-lg text-center flex flex-col items-center gap-stack-md transition-all">

<button class="bg-primary-container text-on-primary font-headline-sm text-headline-sm px-10 py-4 rounded-full flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Bắt đầu học
                </button>
<div class="flex gap-stack-md mt-2">
<button class="bg-transparent border border-white/20 text-white font-label-lg text-label-lg px-6 py-3 rounded-full hover:bg-white/10 active:opacity-80 transition-all">
                        Làm Quiz
                    </button>
<button class="bg-transparent border border-white/20 text-white font-label-lg text-label-lg px-6 py-3 rounded-full hover:bg-white/10 active:opacity-80 transition-all">
                        Ôn từ khó
                    </button>
</div>
</div>
</section>
<!-- Resume Banner -->
<section class="px-container-margin mb-stack-lg">
<div class="hairline-border bg-surface-container-low rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">history</span>
<span class="font-body-md text-body-md text-on-surface">Tiếp tục từ thẻ 45/120?</span>
</div>
<div class="flex gap-stack-md">
<button class="text-primary font-label-lg text-label-lg hover:underline transition-all">Tiếp tục</button>
<button class="text-secondary font-label-lg text-label-lg hover:underline transition-all">Học lại</button>
</div>
</div>
</section>
<!-- Content Section -->

<div class="flex justify-between items-end mb-stack-md border-b border-black/5 pb-2">

<span class="text-inkMuted48 font-label-md text-label-md">120 từ vựng</span>
</div>
<!-- Card List -->
<div class="flex flex-col">
<!-- Item 1 -->
<div class="py-stack-md flex items-center justify-between border-b border-black/10 hover:bg-surface-container-lowest transition-colors">

<span class="font-headline-sm text-headline-sm text-on-surface">apple</span>
<span class="text-secondary font-body-md text-body-md">quả táo</span>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
<!-- Item 2 -->
<div class="py-stack-md flex items-center justify-between border-b border-black/10 hover:bg-surface-container-lowest transition-colors">
<div class="flex flex-col">
<span class="font-headline-sm text-headline-sm text-on-surface">book</span>
<span class="text-secondary font-body-md text-body-md">quyển sách</span>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">

</button>

                            </button>

<!-- Suppressed BottomNavBar as this is a sub-page with a Back action -->
<script>
        // Micro-interactions for active state feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
